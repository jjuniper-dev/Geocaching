version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: geocaching_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geocaching}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geocaching_dev}
      POSTGRES_DB: ${POSTGRES_DB:-geocaching_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geocaching}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
